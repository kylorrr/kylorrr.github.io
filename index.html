<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tua Galleria Privata</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1 id="titolo-pagina">Caricamento galleria in corso...</h1>
    <div class="grid" id="gallery"></div>

    <script type="module">
        // FUNZIONE PER FORZARE IL DOWNLOAD DEFINITIVA
        async function downloadImage(url, filename) {
            try {
                // TRUCCO: Aggiungiamo un parametro finto all'URL per aggirare la cache. 
                // Questo costringe il browser a scaricare un file pulito coi permessi CORS.
                const urlPulito = url + "?dl=1";

                const response = await fetch(urlPulito, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename || 'foto.jpg';
                document.body.appendChild(link);
                link.click();
                
                // Pulizia della memoria
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                }, 100);

            } catch (error) {
                console.error("Errore durante il download forzato:", error);
                // Ultima spiaggia solo se cade la connessione
                window.open(url, '_blank');
            }
        }

        window.forceDownload = downloadImage;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const queryFolderId = params.get('cartella');
            const pathParts = window.location.pathname.split('/').filter(p => p && p !== 'index.html' && p !== '404.html');
            const folderId = queryFolderId || pathParts[pathParts.length - 1];

            if (!folderId) {
                document.getElementById('titolo-pagina').innerText = "Inquadra un QR code valido per vedere le foto.";
                return;
            }

            try {
                const manifestUrl = `https://pub-5d37a62c4e3241d78beb24c69df020b1.r2.dev/${folderId}/manifest.json`;
                const response = await fetch(manifestUrl);
                
                if (!response.ok) {
                    throw new Error('Manifest non trovato');
                }
                
                const manifest = await response.json();
                const foto = manifest.foto;

                if (!foto || foto.length === 0) {
                    document.getElementById('titolo-pagina').innerText = "Questa galleria è vuota o non esiste.";
                    return;
                }

                document.getElementById('titolo-pagina').innerText = "Le tue foto sono pronte!";
                const container = document.getElementById('gallery');
                
                foto.forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${f.url}" alt="${f.nome}">
                        <button onclick="forceDownload('${f.url}', '${f.nome}')">Scarica Foto</button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Errore nel caricamento della galleria:", error);
                document.getElementById('titolo-pagina').innerText = "Questa galleria è vuota o non esiste.";
            }
        }
        init();
    </script>
</body>
</html>
